<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Khanh Hoa</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="bg-mesh"></div>
    
    <nav>
        <div class="logo"><a href="/" style="text-decoration: none; color: inherit;">KHANH HOA</a></div>
        <div class="nav-links">
            <a href="/#about">Về tôi</a>
            <a href="/#pillars">Chuyên môn</a>
            <a href="/#projects">Dự án</a>
            <a href="/#contact">Liên hệ</a>
        </div>
    </nav>

    <main class="post-content">
        <header class="post-header">
            <h1>{{ page.title }}</h1>
            <p class="post-meta">{{ page.date | date: "%d/%m/%Y" }} • {{ page.categories | join: ", " }}</p>
        </header>
        
        <article>
            {{ content }}
        </article>
    </main>

    <footer style="padding: 4rem 10%; border-top: 1px solid var(--glass-border); text-align: center; color: var(--text-dim); font-size: 0.9rem;">
        <p>&copy; 2024 Khanh Hoa. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true, theme: 'dark' });
    </script>
    <script src="/main.js"></script>
</body>
</html>
